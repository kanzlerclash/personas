unsicherheit: >
  Zahlen sind bundesweit (kein sauberer SA-Wert gefunden). Sabines Lage
  (Meisterin + alleinige Betriebsinhaberin mit 8 Beschäftigten) ist deutlich enger als
  „alle SHK-Beschäftigten"; der genannte Anteil ist die Branchen-Obergrenze.
