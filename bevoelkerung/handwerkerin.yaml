verifiziert: false
anteil: "unter 1 % der Erwerbstätigen (SHK-Handwerk bundesweit)"
bezug: >
  Beschäftigte im Sanitär-, Heizung- und Klima-Handwerk (SHK) bundesweit: rund
  280.000–390.000 Personen — deutlich unter 1 % der ~46 Mio. Erwerbstätigen. Sabine als
  Betriebsinhaberin/Meisterin ist eine kleine Teilgruppe davon (zum Vergleich: das
  gesamte Handwerk stellt rund 12 % der Erwerbstätigen).
