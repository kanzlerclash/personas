unsicherheit: >
  „Auto-Pendler" ist bundesweit sehr breit; Toralfs engere Lage (Schichtarbeit, Dorf ohne
  ÖPNV, 45 min pro Weg) ist eine Teilgruppe der langen Landpendler. Ländliche Räume liegen
  bei Auto-Anteil und Distanz über dem Schnitt.
