    herausgeber: "Statistisches Bundesamt (Destatis)"
    jahr: 2024
    wert: "rund 20,8 Mio. Berufspendler; Mehrheit nutzt das Auto (auch auf kurzen Wegen)"
    url: "https://www.destatis.de/DE/Themen/Arbeit/Arbeitsmarkt/Erwerbstaetigkeit/im-Fokus-Pendler.html"
  - titel: "Pendeln 2024/25: Auto 65 %, ÖPNV 16 %"
    herausgeber: "statistiken-aktuell.de (Datenbasis Destatis/Statista)"
    jahr: 2024
    wert: "65 % Auto (−3 Pp. ggü. 2020), ÖPNV 16 %; Ø einfacher Arbeitsweg 17,2 km; 15 % 25–50 km, 5 % 50+ km"
