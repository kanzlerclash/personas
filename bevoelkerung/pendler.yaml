anteil: "ca. 65 % der Berufspendler pendeln mit dem Auto (Ø-Weg 17,2 km)"
bezug: >
  Rund 20,8 Mio. Berufspendler in Deutschland; 65 % nutzen das Auto. Toralf gehört zur
  Gruppe der Auto-Pendler mit überdurchschnittlich langem, ländlichem Arbeitsweg ohne
  brauchbaren ÖPNV (15 % pendeln 25–50 km, 5 % über 50 km).
quellen:
