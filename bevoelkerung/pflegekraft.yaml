unsicherheit: >
  Die ~5 % beziehen sich auf Pflege insgesamt; Kerstins engere Lage (examiniert,
  Krankenhaus-Schichtdienst) entspricht eher den ~13.400 Krankenhaus-Pflegekräften
  (gut 1 % der Erwerbstätigen). Denominator „~1 Mio. Erwerbstätige SA" ist gerundet.
