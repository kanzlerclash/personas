verifiziert: false
anteil: "ca. 5 % der Erwerbstätigen (Pflege gesamt, Sachsen-Anhalt)"
bezug: >
  Beschäftigte in der Pflege in Sachsen-Anhalt (ambulant + stationär + Krankenhaus),
  rund 54.000 Personen bei ~1 Mio. Erwerbstätigen. Kerstin als Krankenhaus-Pflegekraft
  ist die Teilgruppe „Pflegedienst im Krankenhaus" (~13.400).
