unsicherheit: >
  „65+" ist eine Näherung für die Lebenslage „Rentnerpaar im Eigenheim mit kleiner
  Rente". Eigentümerquote und niedriges Renteneinkommen sind darin nicht gesondert
  erfasst und würden die Teilgruppe verkleinern.
