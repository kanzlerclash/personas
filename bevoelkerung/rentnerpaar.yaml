anteil: "ca. 29 % (Bevölkerung 65+)"
bezug: >
  Anteil der Bevölkerung ab 65 Jahren in Sachsen-Anhalt (Rentenalter). Das Paar
  Mitte 70 im abbezahlten Eigenheim gehört zu dieser Gruppe; Sachsen-Anhalt hat
  die älteste Bevölkerung Deutschlands.
