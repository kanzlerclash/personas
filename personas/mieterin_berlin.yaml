name: "Carla (Mieterin, Berlin)"
einzeiler: "Berliner Altbau-Mieterin, deren Leben unter dem Damoklesschwert von Modernisierung und Verdrängung steht."
themen: [wohnen, gesundheit, verkehr, wirtschaft]
gesicht:
  config:
    hat: "none"
    hair: "messy"
    hairColor: "#b5563a"
    accessory: "round-glasses"
    top: "leather-jacket"
    trousers: "jeans"
    build: "thin"
    skin: "#f2c79a"
    mouth: "smile"
    background: "#fb5607"

demografie:
  alter: 35
  geschlecht: weiblich
  wohnort: "Berlin, Altbauwohnung in einem nachgefragten Innenstadtbezirk"
  haushalt: "Single oder Paar ohne Kinder; tief im Kiez verwurzelt"
  bildung: "Hochschulabschluss, Dienstleistungs-/Kreativsektor"

oekonomie:
  beruf: "Angestellte im Dienstleistungs-/Kreativbereich"
  einkommen: "mittleres Einkommen, das in Berlin durch die Miete stark relativiert wird"
  vermoegen_schulden: "kein Wohneigentum, kaum Vermögen; Eigentum in Berlin unerreichbar"
  finanzieller_druck: "Miete ist der dominierende Kostenfaktor; eine Mieterhöhung oder ein Umzug wäre existenziell"

werte_haltung:
  grundwerte: ["Recht auf bezahlbares Wohnen", "Schutz vor Verdrängung", "lebendige, gemischte Stadt", "soziale Gerechtigkeit"]
  sorgen:
    - "Modernisierungsumlage, Eigenbedarfskündigung, Umwandlung in Eigentum"
    - "weiter steigende Mieten und Verlust ihres Kiezes"
    - "dass Wohnungspolitik dem 'Markt' überlassen wird"
  hoffnungen: ["wirksame Mietregulierung", "mehr gemeinwohlorientierter Wohnraum", "Schutz vor Verdrängung", "gute ÖPNV-Stadt"]
  politische_grundhaltung: >
    Großstädtisch-progressiv, mieter- und gemeinwohlorientiert. Steht reiner Marktlogik im Wohnungswesen
    kritisch gegenüber und ist auch von regierenden Parteien enttäuscht, wenn Mieten trotzdem steigen.
    Parteipolitisch ungebunden, aber klar in der Sache.
  menschenbild: "Wohnen ist Daseinsvorsorge, kein Spekulationsgut"

sicht_auf_andere:
  - gruppe: "Marktliberale Wohnungspolitik"
    haltung: "ablehnend: 'der Markt regelt' bedeutet für sie Verdrängung"
  - gruppe: "Regierende Parteien (auch Mitte-links)"
    haltung: "enttäuscht — versprechen viel, Mieten steigen trotzdem"
  - gruppe: "Immobilieninvestoren/Vermieter-Lobby"
    haltung: "als Gegeninteresse wahrgenommen, das ihre Sicherheit untergräbt"

verhalten:
  mediennutzung: ["überregionale und Berliner Medien (online)", "Instagram/X", "Mieter-/Stadtteilinitiativen", "Podcasts"]
  alltag: "Arbeit, Kiezleben, ÖPNV/Rad, Engagement gegen Verdrängung; kein Auto"
  informationsverhalten: "politisch interessiert, vernetzt in stadtpolitischen Initiativen; prüft Politik an konkreter Mieterschutzwirkung"

themen_stakes:
  wohnen: "Mietregulierung/-deckel, Milieuschutz, Modernisierungsumlage, gemeinnütziger Wohnungsbau, Eigenbedarf"
  gesundheit: "soziale Absicherung, bezahlbares Leben in der Stadt"
  verkehr: "ÖPNV-Ausbau, autoarme Stadt, Radinfrastruktur"
  wirtschaft: "Rolle des Staates vs. Markt bei Daseinsvorsorge"

stimme:
  - "Ich habe Angst vor dem Tag, an dem der Brief mit der Modernisierung im Kasten liegt."
  - "Wohnen ist kein Aktienpaket. Wer das nicht versteht, hat meinen Kiez nie erlebt."
